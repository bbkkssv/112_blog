{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
    Password Reset
{% endblock %}

{% block content %}
    <h1>Password Reset</h1>
    <p>Please enter your email address to receive a password reset link.</p>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <input type="submit" value="Reset Password" class="btn btn-warning">
    </form>
{% endblock %}
