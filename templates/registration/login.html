{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="d-flex justify-content-center mt-3">
    <div class="card shadow-sm" style="max-width: 450px; width: 100%;">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Log In</h4>
        </div>
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <input type="submit" value="Login" class="btn btn-dark w-100 mt-2">
                <div class="text-center mt-2">
                    <a href="{% url 'password_reset' %}" class="btn btn-link btn-sm">Forgot Password?</a>
                </div>
            </form>
        </div>
        <div class="card-footer text-muted text-center">
            Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
