{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block content %}
  <h2>Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <input type="submit" value="Login" class ="btn btn-primary">
    <a href="{% url 'password_reset' %}" class="btn btn-link">Forgot Password?</a>
  </form>
{% endblock %}
