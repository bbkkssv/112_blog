{% extends 'base.html' %}

{% block title %}
    Delete Post
{% endblock %}

{% block content %}
<div class="d-flex justify-content-center">
    <div class="card border-danger shadow-sm" style="max-width: 500px; width: 100%;">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">Delete Post</h4>
        </div>
        <div class="card-body p-4">
            <p class="card-text">Are you sure you want to delete <strong>"{{ post.title }}"</strong>? This action cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <input type="submit" value="Delete Post" class="btn btn-danger">
                    <a href="{% url 'posts' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
