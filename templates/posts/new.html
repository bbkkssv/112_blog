{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
    Create New Post
{% endblock %}

{% block content %}
    <h1>New Post</h1>
    <form method="post">
        {% csrf_token %}
            {{ form|crispy }}
           
        <input type="submit" value="Create Post" class="btn btn-primary">
    </form>
{% endblock %}
