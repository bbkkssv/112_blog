{% extends 'base.html' %}

{% block title %}
    Posts
{% endblock %}

{% block content %}
    <h1>Posts</h1>
    {% for post in posts %}
        <h4>{{ post.title }}</h4>
        <a href="{% url 'post_detail' post.pk %}" class="btn btn-primary btn-sm">Continue Reading</a>
    {% endfor %}
{% endblock %}
