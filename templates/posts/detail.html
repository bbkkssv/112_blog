{% extends 'base.html' %}

{% block title %}
    {{ post.title }}
{% endblock %}

{% block content %}
    <h1>{{ post.title }}</h1>
    <h4>{{ post.sub_title }}</h4>
    <p>{{ post.body }}</p>
    <p><small>By {{ post.author }} | {{ post.created_on }}</small></p>
    <a href="{% url 'post_edit' post.pk %}" class="btn btn-warning">Edit</a>
    <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger">Delete</a>
{% endblock %}
