{% extends 'base.html' %}

{% block title %}
    {{ post.title }}
{% endblock %}

{% block content %}
    <h1>{{ post.title }}</h1>
    <h4>{{ post.sub_title }}</h4>
    <p>{{ post.body }}</p>
        <span class="badge bg-info">Status: {{ post.status.name }}</span>
    <hr>
    <p><small>By {{ post.author }} | {{ post.created_on }}</small></p>
    {% if user == post.author %}
    <a href="{% url 'post_edit' post.pk %}" class="btn btn-primary">Edit</a>
    <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger">Delete</a>
    {% endif %}
{% endblock %}
